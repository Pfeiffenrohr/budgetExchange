name: Java CI budgetExchange Deployment

on:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4  # Neuere Version
        with:
          dependency-graph: disabled  # Dependency submission deaktiviert

      - name: Build with Gradle Wrapper
        run: ./gradlew build

      - name: login to docker hub
        env:
          username: ${{secrets.DOCKERHUB_USERNAME}}
          password: ${{secrets.DOCKERHUB_PASSWORD}}
        run: |
          docker login -u $username -p $password

      - name: build the docker image
        run: |
          docker build . -f Dockerfile -t pfeiffenrohr/cbudgetexchange:latest

      - name: push the docker image
        run: docker push ${{secrets.DOCKERHUB_USERNAME}}/cbudgetexchange:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/richard/docker/CbudgetNew
            docker-compose pull cbudgetexchange
            docker-compose up -d cbudgetexchange